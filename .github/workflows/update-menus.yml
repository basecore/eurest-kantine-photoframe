name: Update Menus

on:
  workflow_dispatch:
    inputs:
      display_mode:
        description: "Display mode: day or week"
        required: true
        default: "day"
        type: choice
        options:
          - day
          - week
      display_day:
        description: "Optional for day mode: monday|tuesday|wednesday|thursday|friday"
        required: false
        default: ""
      week_offset:
        description: "0 = current week/current-day logic, 1 = next week"
        required: false
        default: "0"
      only:
        description: "Optional filter: siemens or schaeffler,aumovio"
        required: false
        default: ""

  schedule:
    - cron: "0 4 * * 1-5"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: update-menus
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build + git push (GitHub-hosted)
  # ─────────────────────────────────────────────
  screenshot:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      TZ: Europe/Berlin
      DISPLAY_MODE: ${{ github.event.inputs.display_mode || 'day' }}
      DISPLAY_DAY: ${{ github.event.inputs.display_day || '' }}
      WEEK_OFFSET: ${{ github.event.inputs.week_offset || '0' }}
      ONLY: ${{ github.event.inputs.only || '' }}
      CATERINGPORTAL_SID: ${{ secrets.CATERINGPORTAL_SID }}
    outputs:
      skip: ${{ steps.skip_check.outputs.skip }}
      screenshot_outcome: ${{ steps.generate_menus.outcome }}
      github_push_outcome: ${{ steps.github_push.outcome }}
      dated_filename: ${{ steps.set_filename.outputs.dated_filename }}
      old_files: ${{ steps.find_old.outputs.old_files }}
      commit_sha: ${{ steps.github_push.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if workflow should run
        id: skip_check
        run: |
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Setup Python
        if: steps.skip_check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          python -m pip install --upgrade pip
          sudo apt-get update -q
          sudo apt-get install -yq ncftp curl lftp
          pip install pillow playwright pypdf
          python -m playwright install --with-deps chromium

      - name: Show effective settings
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          echo "DISPLAY_MODE=$DISPLAY_MODE"
          echo "DISPLAY_DAY=$DISPLAY_DAY"
          echo "WEEK_OFFSET=$WEEK_OFFSET"
          echo "ONLY=$ONLY"

      - name: Generate all menus
        id: generate_menus
        if: steps.skip_check.outputs.skip == 'false'
        continue-on-error: true
        run: python scripts/generate_all.py

      - name: Show generated files
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          echo "Root docs:"
          find docs -maxdepth 3 -type f | sort || true

      - name: Generate RSS feeds
        id: rss
        if: steps.skip_check.outputs.skip == 'false'
        continue-on-error: true
        run: python scripts/generate_rss.py

      - name: Set dated filename output
        id: set_filename
        if: steps.skip_check.outputs.skip == 'false' && steps.generate_menus.outcome == 'success'
        run: |
          LATEST=$(ls -t docs/images/kantine_*.jpg | head -1)
          FNAME=$(basename "$LATEST")
          echo "dated_filename=${FNAME}" >> $GITHUB_OUTPUT
          echo "Dated filename: ${FNAME}"

      - name: Delete images older than 21 days (GitHub)
        id: find_old
        if: steps.skip_check.outputs.skip == 'false'
        continue-on-error: true
        run: |
          CUTOFF=$(date -u -d "21 days ago" +%Y-%m-%d)
          OLD_LIST=""
          for f in docs/images/kantine_*.jpg; do
            [ -e "$f" ] || continue
            FDATE=$(basename "$f" | sed -E 's/^kantine_[0-9]{4}-W[0-9]{2}_([0-9]{4}-[0-9]{2}-[0-9]{2})_.*\.jpg$/\1/')
            if [[ "$FDATE" != "$(basename "$f")" && "$FDATE" < "$CUTOFF" ]]; then
              echo "Deleting old file from GitHub: $f (date: $FDATE)"
              git rm -f "$f" || true
              OLD_LIST="${OLD_LIST}$(basename "$f") "
            fi
          done
          OLD_LIST=$(echo "$OLD_LIST" | xargs)
          echo "old_files=${OLD_LIST}" >> $GITHUB_OUTPUT
          echo "Files to delete on bplaced: '${OLD_LIST}'"

      - name: Commit and push to GitHub
        id: github_push
        if: steps.skip_check.outputs.skip == 'false'
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update photoframe menus $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────
  # Job 2: FTP Upload via self-hosted HAOS runner (primary)
  # ─────────────────────────────────────────────────────────────────
  upload-haos:
    runs-on: [self-hosted, haos]
    needs: screenshot
    if: needs.screenshot.outputs.skip == 'false'
    continue-on-error: true
    env:
      BPLACED_PASS: ${{ secrets.BPLACED_FTP_PASSWORD }}
      DATED_FILE: ${{ needs.screenshot.outputs.dated_filename }}
      OLD_FILES: ${{ needs.screenshot.outputs.old_files }}
      COMMIT_SHA: ${{ needs.screenshot.outputs.commit_sha }}
    outputs:
      upload_outcome: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.screenshot.outputs.commit_sha }}
          fetch-depth: 1

      - name: Verify expected files exist
        run: |
          echo "DATED_FILE=${DATED_FILE}"
          echo "COMMIT_SHA=${COMMIT_SHA}"
          if [[ -n "${DATED_FILE}" ]]; then
            if [[ -f "docs/images/${DATED_FILE}" ]]; then
              echo "✅ docs/images/${DATED_FILE} found."
            else
              echo "❌ docs/images/${DATED_FILE} NOT found – listing docs/images/:"
              ls -lh docs/images/ || true
            fi
          fi
          ls -lh docs/feed_all.php || echo "❌ docs/feed_all.php not found"
          ls -lh docs/feed_all_main.php || echo "❌ docs/feed_all_main.php not found"

      - name: Install ncftp on runner
        run: |
          which ncftpput || (apt-get update -q && apt-get install -yq ncftp)

      - name: Deploy to bplaced via ncftpput (HAOS self-hosted)
        id: ftp_haos
        run: |
          FTP_HOST="basecore.bplaced.net"
          FTP_USER="basecore"
          MAX_RETRIES=5
          RETRY_DELAY=30
          CMD_TIMEOUT=90
          attempt=1

          while [ $attempt -le $MAX_RETRIES ]; do
            echo "ncftpput attempt $attempt of $MAX_RETRIES..."
            if timeout $CMD_TIMEOUT ncftpput -u "$FTP_USER" -p "$BPLACED_PASS" -P 21 "$FTP_HOST" /www/ docs/feed_all.php && \
               timeout $CMD_TIMEOUT ncftpput -u "$FTP_USER" -p "$BPLACED_PASS" -P 21 "$FTP_HOST" /www/ docs/feed_all.xml && \
               timeout $CMD_TIMEOUT ncftpput -u "$FTP_USER" -p "$BPLACED_PASS" -P 21 "$FTP_HOST" /www/ docs/feed_all_main.php && \
               timeout $CMD_TIMEOUT ncftpput -u "$FTP_USER" -p "$BPLACED_PASS" -P 21 "$FTP_HOST" /www/ docs/feed_all_main.xml && \
               timeout $CMD_TIMEOUT ncftpput -u "$FTP_USER" -p "$BPLACED_PASS" -P 21 "$FTP_HOST" /www/images/ docs/images/kantine_*.jpg; then
              echo "ncftpput success."
              echo "UPLOAD_METHOD=ncftp-haos" >> $GITHUB_ENV
              break
            fi
            echo "ncftpput failed. Waiting ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
            attempt=$((attempt + 1))
          done

          if [[ $attempt -gt $MAX_RETRIES ]]; then
            echo "UPLOAD_METHOD=failed-haos" >> $GITHUB_ENV
            exit 1
          fi

          if [[ -n "${OLD_FILES}" ]]; then
            echo "Deleting old files from bplaced: ${OLD_FILES}"
            for fname in ${OLD_FILES}; do
              echo "ncftp delete: /www/images/${fname}"
              ncftp -u "$FTP_USER" -p "$BPLACED_PASS" "$FTP_HOST" << FTPCMD || true
          delete /www/images/${fname}
          quit
          FTPCMD
            done
          else
            echo "No old files to delete on bplaced."
          fi

  # ──────────────────────────────────────────────────────────────────────
  # Job 3: FTP Upload via GitHub Actions (fallback)
  # ──────────────────────────────────────────────────────────────────────
  upload-fallback:
    runs-on: ubuntu-latest
    needs: [screenshot, upload-haos]
    if: always() && needs.screenshot.outputs.skip == 'false' && needs.upload-haos.result != 'success'
    continue-on-error: true
    env:
      BPLACED_PASS: ${{ secrets.BPLACED_FTP_PASSWORD }}
      DATED_FILE: ${{ needs.screenshot.outputs.dated_filename }}
      OLD_FILES: ${{ needs.screenshot.outputs.old_files }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.screenshot.outputs.commit_sha }}
          fetch-depth: 1

      - name: Install FTP tools
        run: sudo apt-get update -q && sudo apt-get install -yq lftp ncftp

      - name: Deploy to bplaced via FTP (GitHub-hosted fallback)
        id: bplaced_upload
        run: |
          FTP_HOST="basecore.bplaced.net"
          FTP_USER="basecore"
          MAX_RETRIES=6
          RETRY_DELAY=60
          CMD_TIMEOUT=90

          DELETE_CMDS=""
          if [[ -n "${OLD_FILES}" ]]; then
            for fname in ${OLD_FILES}; do
              DELETE_CMDS="${DELETE_CMDS} rm -f /www/images/${fname};"
            done
            echo "Will delete from bplaced: ${OLD_FILES}"
          fi

          lftp_upload() {
            local attempt=1
            while [ $attempt -le $MAX_RETRIES ]; do
              echo "lftp plain FTP attempt $attempt of $MAX_RETRIES..."
              if timeout $CMD_TIMEOUT lftp \
                -u "$FTP_USER","$BPLACED_PASS" \
                -e "set ftp:ssl-allow false; set net:timeout 20; set net:max-retries 1; set ftp:passive-mode true; cd /www; put docs/feed_all.php feed_all.php; put docs/feed_all.xml feed_all.xml; put docs/feed_all_main.php feed_all_main.php; put docs/feed_all_main.xml feed_all_main.xml; cd /www/images; mput docs/images/kantine_*.jpg;${DELETE_CMDS} bye" \
                ftp://$FTP_HOST; then
                echo "lftp plain FTP success."
                return 0
              fi
              echo "lftp failed. Waiting ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              attempt=$((attempt + 1))
            done
            return 1
          }

          ncftp_upload() {
            local attempt=1
            while [ $attempt -le $MAX_RETRIES ]; do
              echo "ncftpput attempt $attempt of $MAX_RETRIES..."
              if timeout $CMD_TIMEOUT ncftpput -u "$FTP_USER" -p "$BPLACED_PASS" -P 21 "$FTP_HOST" /www/ docs/feed_all.php && \
                 timeout $CMD_TIMEOUT ncftpput -u "$FTP_USER" -p "$BPLACED_PASS" -P 21 "$FTP_HOST" /www/ docs/feed_all.xml && \
                 timeout $CMD_TIMEOUT ncftpput -u "$FTP_USER" -p "$BPLACED_PASS" -P 21 "$FTP_HOST" /www/ docs/feed_all_main.php && \
                 timeout $CMD_TIMEOUT ncftpput -u "$FTP_USER" -p "$BPLACED_PASS" -P 21 "$FTP_HOST" /www/ docs/feed_all_main.xml && \
                 timeout $CMD_TIMEOUT ncftpput -u "$FTP_USER" -p "$BPLACED_PASS" -P 21 "$FTP_HOST" /www/images/ docs/images/kantine_*.jpg; then
                echo "ncftpput success."
                if [[ -n "${OLD_FILES}" ]]; then
                  for fname in ${OLD_FILES}; do
                    ncftp -u "$FTP_USER" -p "$BPLACED_PASS" "$FTP_HOST" << FTPCMD || true
          delete /www/images/${fname}
          quit
          FTPCMD
                  done
                fi
                return 0
              fi
              echo "ncftpput failed. Waiting ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              attempt=$((attempt + 1))
            done
            return 1
          }

          ftps_upload() {
            local attempt=1
            while [ $attempt -le $MAX_RETRIES ]; do
              echo "FTPS attempt $attempt of $MAX_RETRIES..."
              if timeout $CMD_TIMEOUT lftp \
                -u "$FTP_USER","$BPLACED_PASS" \
                -e "set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate false; set ssl:check-hostname false; set net:timeout 20; set net:max-retries 1; set ftp:passive-mode true; cd /www; put docs/feed_all.php feed_all.php; put docs/feed_all.xml feed_all.xml; put docs/feed_all_main.php feed_all_main.php; put docs/feed_all_main.xml feed_all_main.xml; cd /www/images; mput docs/images/kantine_*.jpg;${DELETE_CMDS} bye" \
                ftp://$FTP_HOST; then
                echo "FTPS success."
                return 0
              fi
              echo "FTPS failed. Waiting ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              attempt=$((attempt + 1))
            done
            return 1
          }

          if lftp_upload; then
            echo "UPLOAD_METHOD=lftp-fallback" >> $GITHUB_ENV
          elif ncftp_upload; then
            echo "UPLOAD_METHOD=ncftp-fallback" >> $GITHUB_ENV
          elif ftps_upload; then
            echo "UPLOAD_METHOD=ftps-fallback" >> $GITHUB_ENV
          else
            echo "UPLOAD_METHOD=failed" >> $GITHUB_ENV
            exit 1
          fi

  # ─────────────────────────────────────────────
  # Job 4: Status E-Mail
  # ─────────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [screenshot, upload-haos, upload-fallback]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Build status email
        run: |
          RUN_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          REPO_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DATED_FILE="${{ needs.screenshot.outputs.dated_filename }}"

          SS="${{ needs.screenshot.outputs.screenshot_outcome }}"
          GH="${{ needs.screenshot.outputs.github_push_outcome }}"
          UH="${{ needs.upload-haos.result }}"
          UF="${{ needs.upload-fallback.result }}"

          status_icon() {
            case "$1" in
              success) echo "✅ OK" ;;
              failure) echo "❌ FAILED" ;;
              skipped) echo "⏭ SKIPPED" ;;
              *)       echo "❓ UNKNOWN" ;;
            esac
          }

          SS_I=$(status_icon "$SS")
          GH_I=$(status_icon "$GH")
          UH_I=$(status_icon "$UH")
          UF_I=$(status_icon "$UF")

          if [[ "$UH" == "success" ]]; then
            UPLOAD_NOTE=" (via HAOS self-hosted runner)"
          elif [[ "$UF" == "success" ]]; then
            UPLOAD_NOTE=" (via GitHub Actions fallback)"
          else
            UPLOAD_NOTE=" (all methods failed)"
          fi

          if [[ "$SS" == "success" && "$GH" == "success" && ( "$UH" == "success" || "$UF" == "success" ) ]]; then
            SUBJ="✅ OK: Eurest Kantine PhotoFrame update ($RUN_TIME)"
            HC="#2e7d32"
            OV="All tasks successful"
          else
            SUBJ="❌ FAILED: Eurest Kantine PhotoFrame update ($RUN_TIME)"
            HC="#b71c1c"
            OV="One or more tasks failed"
          fi

          SCREENSHOT_SECTION=""
          if [[ "$SS" == "success" && -n "${DATED_FILE}" ]]; then
            IMG_URL="http://basecore.bplaced.net/images/${DATED_FILE}"
            SCREENSHOT_SECTION="<div style=\"margin-top:24px;\"><h3 style=\"color:#333;margin-bottom:8px;\">📸 Aktuelles Kantinenbild (${DATED_FILE})</h3><img src=\"${IMG_URL}\" alt=\"Kantine Menü\" style=\"max-width:100%;border:1px solid #ddd;border-radius:4px;display:block;\"/><p style=\"font-size:11px;color:#999;margin-top:4px;\">Falls das Bild nicht lädt: <a href=\"${IMG_URL}\">direkt öffnen</a></p></div>"
          fi

          cat > email_body.html << 'MAILEOF'
          <!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"></head>
          <body style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;padding:20px;color:#333;">
          MAILEOF

          cat >> email_body.html << MAILEOF2
            <div style="background:${HC};color:#fff;padding:16px 20px;border-radius:6px 6px 0 0;">
              <h2 style="margin:0;">Eurest Kantine PhotoFrame - Update Status</h2>
            </div>
            <div style="border:1px solid #ddd;padding:20px;">
              <p><strong>Time:</strong> ${RUN_TIME}</p>
              <p><strong>Status:</strong> ${OV}</p>
              <table style="width:100%;border-collapse:collapse;font-size:14px;">
                <tr style="background:#f5f5f5;">
                  <th style="text-align:left;padding:8px;border:1px solid #ddd;">Task</th>
                  <th style="text-align:left;padding:8px;border:1px solid #ddd;">Status</th>
                </tr>
                <tr><td style="padding:8px;border:1px solid #ddd;">Generate menus</td><td style="padding:8px;border:1px solid #ddd;">${SS_I}</td></tr>
                <tr><td style="padding:8px;border:1px solid #ddd;">GitHub push</td><td style="padding:8px;border:1px solid #ddd;">${GH_I}</td></tr>
                <tr><td style="padding:8px;border:1px solid #ddd;">FTP Upload HAOS (primary)</td><td style="padding:8px;border:1px solid #ddd;">${UH_I}</td></tr>
                <tr><td style="padding:8px;border:1px solid #ddd;">FTP Upload GitHub (fallback)</td><td style="padding:8px;border:1px solid #ddd;">${UF_I}</td></tr>
              </table>
              <p><strong>Upload method:</strong>${UPLOAD_NOTE}</p>
              ${SCREENSHOT_SECTION}
              <p style="font-size:13px;margin-top:20px;"><a href="${REPO_URL}">🔗 View GitHub Actions log</a></p>
            </div></body></html>
          MAILEOF2

          echo "EMAIL_SUBJECT=${SUBJ}" >> $GITHUB_ENV

      - name: Send status email
        uses: basecore/action-send-mail@master
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ env.EMAIL_SUBJECT }}
          body: file://email_body.html
          to: basecore@gmx.de
          from: Eurest Kantine PhotoFrame <${{ secrets.MAIL_USERNAME }}>
          content_type: text/html

  # ──────────────────────────────────────────────────────────────────────
  # Job 5: bplaced feed Verification
  # ──────────────────────────────────────────────────────────────────────
  verify-bplaced:
    runs-on: [self-hosted, haos]
    needs: [screenshot, upload-haos, upload-fallback]
    if: |
      always() &&
      needs.screenshot.outputs.skip == 'false' &&
      (needs.upload-haos.result == 'success' || needs.upload-fallback.result == 'success')
    steps:
      - name: Wait for bplaced propagation (90s)
        run: |
          echo "Waiting 90 seconds for bplaced to serve updated feed_all.php..."
          sleep 90

      - name: Fetch and verify feed_all.php content
        id: verify
        run: |
          FEED_URL="http://basecore.bplaced.net/feed_all.php"
          TODAY=$(date -u +%Y-%m-%d)
          DATED_FILE="${{ needs.screenshot.outputs.dated_filename }}"
          MAX_ATTEMPTS=4
          RETRY_DELAY=60

          echo "Checking ${FEED_URL} for today's date: ${TODAY}"
          echo "Expected filename in feed: ${DATED_FILE}"

          VERIFY_STATUS="fail"
          HTTP_STATUS=""
          CONTENT_SNIPPET=""
          ATTEMPT=1

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Attempt $ATTEMPT of $MAX_ATTEMPTS..."

            RESPONSE=$(curl -s -o /tmp/feed_response.txt -w "%{http_code}" \
              --max-time 30 --connect-timeout 10 -L "${FEED_URL}" 2>/dev/null) || true
            HTTP_STATUS="${RESPONSE}"

            echo "HTTP status: ${HTTP_STATUS}"

            if [[ "${HTTP_STATUS}" == "200" ]]; then
              CONTENT=$(cat /tmp/feed_response.txt 2>/dev/null || echo "")
              CONTENT_SNIPPET=$(echo "$CONTENT" | head -c 500 | tr '\n' ' ')

              DATE_FOUND=false
              if echo "$CONTENT" | grep -q "${TODAY}"; then
                DATE_FOUND=true
              fi

              FNAME_FOUND=false
              if [[ -n "${DATED_FILE}" ]] && echo "$CONTENT" | grep -q "${DATED_FILE}"; then
                FNAME_FOUND=true
              fi

              if $DATE_FOUND || $FNAME_FOUND; then
                VERIFY_STATUS="ok"
                echo "✅ Feed verified: date=${DATE_FOUND}, filename=${FNAME_FOUND}"
                break
              else
                echo "⚠️ Feed returned 200 but content not yet updated. Retrying in ${RETRY_DELAY}s..."
              fi
            else
              echo "⚠️ HTTP ${HTTP_STATUS} — retrying in ${RETRY_DELAY}s..."
            fi

            sleep $RETRY_DELAY
            ATTEMPT=$((ATTEMPT + 1))
          done

          echo "verify_status=${VERIFY_STATUS}" >> $GITHUB_OUTPUT
          echo "http_status=${HTTP_STATUS}" >> $GITHUB_OUTPUT
          echo "content_snippet=${CONTENT_SNIPPET}" >> $GITHUB_OUTPUT
          echo "date_today=${TODAY}" >> $GITHUB_OUTPUT
          echo "dated_file=${DATED_FILE}" >> $GITHUB_OUTPUT

      - name: Build verification email
        run: |
          VS="${{ steps.verify.outputs.verify_status }}"
          HTTP="${{ steps.verify.outputs.http_status }}"
          TODAY="${{ steps.verify.outputs.date_today }}"
          DATED_FILE="${{ steps.verify.outputs.dated_file }}"
          SNIPPET="${{ steps.verify.outputs.content_snippet }}"
          RUN_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          FEED_URL="http://basecore.bplaced.net/feed_all.php"
          IMG_URL="http://basecore.bplaced.net/images/${DATED_FILE}"
          REPO_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [[ "$VS" == "ok" ]]; then
            SUBJ="✅ bplaced LIVE: feed_all.php aktualisiert (${TODAY})"
            HC="#2e7d32"
            STATUS_MSG="✅ feed_all.php ist aktuell – das heutige Datum (${TODAY}) wurde im Feed gefunden."
            STATUS_DETAIL="bplaced liefert die neue Version aus."
          else
            SUBJ="⚠️ bplaced CHECK FAILED: feed_all.php ggf. nicht aktualisiert (${TODAY})"
            HC="#e65100"
            STATUS_MSG="⚠️ feed_all.php konnte nicht als aktuell verifiziert werden."
            STATUS_DETAIL="Das heutige Datum (${TODAY}) wurde nach mehreren Versuchen nicht im Feed-Inhalt gefunden. HTTP-Status: ${HTTP}. Bitte manuell prüfen."
          fi

          cat > verify_email.html << 'MAILEOF'
          <!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"></head>
          <body style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;padding:20px;color:#333;">
          MAILEOF

          cat >> verify_email.html << MAILEOF2
            <div style="background:${HC};color:#fff;padding:16px 20px;border-radius:6px 6px 0 0;">
              <h2 style="margin:0;">Eurest Kantine PhotoFrame – bplaced Verifikation</h2>
            </div>
            <div style="border:1px solid #ddd;padding:20px;">
              <p><strong>Zeit:</strong> ${RUN_TIME}</p>
              <p style="font-size:15px;">${STATUS_MSG}</p>
              <p style="color:#555;">${STATUS_DETAIL}</p>
              <table style="width:100%;border-collapse:collapse;font-size:14px;margin-top:12px;">
                <tr style="background:#f5f5f5;">
                  <th style="text-align:left;padding:8px;border:1px solid #ddd;">Detail</th>
                  <th style="text-align:left;padding:8px;border:1px solid #ddd;">Wert</th>
                </tr>
