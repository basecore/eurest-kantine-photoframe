name: Kantine Screenshot

on:
  workflow_dispatch:
    inputs:
      week_offset:
        description: '0 = aktuelle Woche, 1 = naechste Woche'
        required: false
        default: '1'
      location:
        description: 'both | schaeffler | aumovio'
        required: false
        default: 'both'
  schedule:
    # Mo-Do 00:00 UTC = 02:00 CEST -> aktuelle Woche
    - cron: '0 0 * * 1-4'
    # Fr 12:00 UTC = 14:00 CEST -> naechste Woche vorab
    - cron: '0 12 * * 5'
    # Sa + So 08:00 UTC = 10:00 CEST -> naechste Woche
    - cron: '0 8 * * 6,0'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - location_id: '8949'
            location_name: 'schaeffler'
          - location_id: '8950'
            location_name: 'aumovio'

    steps:
      - uses: actions/checkout@v4

      - name: Skip if location filter set
        id: check
        run: |
          LOC_INPUT="${{ github.event.inputs.location }}"
          if [ -z "$LOC_INPUT" ] || [ "$LOC_INPUT" = "both" ]; then
            echo "SKIP=false" >> $GITHUB_ENV
          elif [ "$LOC_INPUT" = "${{ matrix.location_name }}" ]; then
            echo "SKIP=false" >> $GITHUB_ENV
          else
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Determine WEEK_OFFSET
        if: env.SKIP != 'true'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "WEEK_OFFSET=${{ github.event.inputs.week_offset }}" >> $GITHUB_ENV
          elif [ "$(date -u +%u)" = "5" ] && [ "$(date -u +%H)" -ge 12 ]; then
            echo "WEEK_OFFSET=1" >> $GITHUB_ENV
          elif [ "$(date -u +%u)" = "6" ] || [ "$(date -u +%u)" = "7" ]; then
            echo "WEEK_OFFSET=1" >> $GITHUB_ENV
          else
            echo "WEEK_OFFSET=0" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        if: env.SKIP != 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq chromium-browser fonts-dejavu fonts-liberation
          pip install playwright Pillow
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Scrape & render – ${{ matrix.location_name }}
        if: env.SKIP != 'true'
        id: screenshot
        env:
          EUREST_LOCATION_ID:   ${{ matrix.location_id }}
          EUREST_LOCATION_NAME: ${{ matrix.location_name }}
        run: python scripts/take_screenshot.py

      - name: Generate RSS feeds
        if: env.SKIP != 'true' && steps.screenshot.outcome == 'success'
        run: python scripts/generate_rss.py

      - name: Upload docs artifact
        if: env.SKIP != 'true' && steps.screenshot.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ matrix.location_name }}
          path: docs/
          retention-days: 1

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kantine-debug-${{ matrix.location_name }}-${{ github.run_number }}
          path: docs/images/
          retention-days: 10

  commit:
    needs: scrape
    runs-on: ubuntu-latest
    # Laeuft auch wenn einzelne scrape-Jobs geskippt wurden,
    # aber nicht wenn ALLE fehlgeschlagen sind
    if: always() && needs.scrape.result != 'failure'

    steps:
      - uses: actions/checkout@v4

      - name: Download schaeffler artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-schaeffler
          path: docs/
        continue-on-error: true

      - name: Download aumovio artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-aumovio
          path: docs/
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "Keine Aenderungen – nichts zu committen" && exit 0
          git commit -m "chore: kantine update $(date -u +%Y-%m-%d) KW-OFFSET=${WEEK_OFFSET:-?}"
          git push
